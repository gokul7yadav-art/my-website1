<!DOCTYPE html>
<html>
<head>
  <title>Loadout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: black;
      text-align: center;
    }

    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('bg.jpg.jpg') center/cover no-repeat;
      filter: blur(12px) brightness(0.5);
      z-index: -1;
    }

    .card {
      margin: 20px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }

    a {
      color: #00f7ff;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="bg"></div>

<h1>Loadout</h1>

<div class="card">
  <h2>M416 🔫</h2>
  <p>Primary Weapon</p>
</div>

<div class="card">
  <h2>Tactical ⚡</h2>
  <p>Playstyle</p>
</div>

<a href="index.html">← Back</a>

</body>
</html>
