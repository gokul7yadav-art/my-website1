<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loadout - STK×Ghost</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  color: white;
  min-height: 100vh;
  padding: 20px;

  background: url('bg.jpg.jpg') no-repeat center center/cover;
}

/* Dark overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: -1;
}

/* Back button */
.back {
  position: absolute;
  top: 20px;
  left: 20px;
  text-decoration: none;
  color: #00f5d4;
  font-weight: bold;
}

/* Title */
.title {
  text-align: center;
  font-size: 32px;
  margin-top: 40px;
  color: #00f5d4;
  text-shadow: 0 0 15px #00f5d4;
}

/* Section */
.section {
  margin-top: 40px;
  text-align: center;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  max-width: 400px;
  margin: auto;
}

/* Card */
.card {
  background: rgba(255,255,255,0.08);
  border-radius: 15px;
  padding: 25px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00f5d4;
}

.weapon {
  font-size: 24px;
  color: #00f5d4;
  font-weight: bold;
}

.label {
  margin-top: 8px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<a href="index.html" class="back">⬅ Back</a>

<h1 class="title">Loadout</h1>

<div class="section">
  <div class="grid">

    <div class="card">
      <div class="weapon">M416 🔫</div>
      <div class="label">Primary Weapon</div>
    </div>

    <div class="card">
      <div class="weapon">Tactical ⚡</div>
      <div class="label">Playstyle</div>
    </div>

  </div>
</div>

</body>
</html>
