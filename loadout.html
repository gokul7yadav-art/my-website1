<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loadout</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
  font-family:Arial;
  color:white;
  padding:20px;
  background:url('bg.jpg.jpg') center/cover no-repeat;
  animation:fadeIn 0.6s ease;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

.nav {
  position:fixed;
  top:0;
  width:100%;
  padding:12px 0;
  text-align:center;
  background:rgba(0,0,0,0.6);
}

.nav a {
  position:relative;
  margin:0 15px;
  color:#00f5d4;
  text-decoration:none;
}

.nav a.active { color:white; }

.nav a::after {
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  left:0;
  bottom:-4px;
  background:#00f5d4;
  transition:0.3s;
}

.nav a:hover::after { width:100%; }

.title {
  text-align:center;
  margin-top:60px;
  font-size:32px;
  color:#00f5d4;
}

.card {
  margin:30px auto;
  max-width:300px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.08);
  text-align:center;
  transition:0.3s;
  opacity:0;
  transform:translateY(30px);
}

.card:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #00f5d4;
}

.weapon {
  font-size:22px;
  color:#00f5d4;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<nav class="nav">
  <a href="index.html">Home</a>
  <a href="stats.html">Stats</a>
  <a href="loadout.html" class="active">Loadout</a>
</nav>

<h1 class="title">Loadout</h1>

<div class="card">
  <div class="weapon">M416 🔫</div>
  Primary Weapon
</div>

<div class="card">
  <div class="weapon">Tactical ⚡</div>
  Playstyle
</div>

<script>
const cards = document.querySelectorAll('.card');
const obs = new IntersectionObserver(entries=>{
 entries.forEach(e=>{
  if(e.isIntersecting){
   e.target.style.opacity=1;
   e.target.style.transform="translateY(0)";
  }
 });
});
cards.forEach(c=>obs.observe(c));
</script>

</body>
</html>
