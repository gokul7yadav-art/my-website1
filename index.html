<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STK×Ghost</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  color: white;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;

  /* Background image */
  background: url('bg.jpg.jpg') no-repeat center center/cover;
}

/* Dark overlay */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

/* Main container */
.container {
  position: relative;
  text-align: center;
  z-index: 1;
}

/* Title */
.title {
  font-size: 40px;
  color: #00f5d4;
  text-shadow: 0 0 20px #00f5d4;
}

/* Subtitle */
.subtitle {
  margin-top: 10px;
  font-size: 18px;
  color: gold;
}

/* Buttons container */
.buttons {
  margin-top: 30px;
  display: flex;
  gap: 15px;
  justify-content: center;
}

/* Buttons */
.btn {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #00f5d4;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* Secondary button */
.btn.secondary {
  background: transparent;
  border: 2px solid #00f5d4;
  color: #00f5d4;
}
</style>
</head>

<body>

<div class="container">
  <h1 class="title">STK×Ghost 🔥</h1>
  <p class="subtitle">SS Rank • Tactical Player</p>

  <div class="buttons">
    <a href="stats.html">
      <button class="btn">View Stats</button>
    </a>

    <a href="loadout.html">
      <button class="btn secondary">Loadout</button>
    </a>
  </div>
</div>

</body>
</html>
