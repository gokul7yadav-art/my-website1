<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STK×Ghost</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
  font-family: Arial, sans-serif;
  color:white;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:url('bg.jpg.jpg') center/cover no-repeat;
  animation:fadeIn 0.6s ease;
}

body::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}

/* NAVBAR */
.nav {
  position:fixed;
  top:0;
  width:100%;
  padding:12px 0;
  text-align:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

.nav a {
  position:relative;
  margin:0 15px;
  color:#00f5d4;
  text-decoration:none;
  font-weight:bold;
}

.nav a.active { color:white; }

.nav a::after {
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  left:0;
  bottom:-4px;
  background:#00f5d4;
  transition:0.3s;
}

.nav a:hover::after { width:100%; }

/* CONTENT */
.container {
  text-align:center;
}

.title {
  font-size:40px;
  color:#00f5d4;
  animation:glow 2s infinite alternate;
}

.subtitle {
  margin-top:10px;
  color:gold;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes glow {
  from {text-shadow:0 0 10px #00f5d4;}
  to {text-shadow:0 0 25px #00f5d4;}
}
</style>
</head>

<body>

<nav class="nav">
  <a href="index.html" class="active">Home</a>
  <a href="stats.html">Stats</a>
  <a href="loadout.html">Loadout</a>
</nav>

<div class="container">
  <h1 class="title">STK×Ghost 🔥</h1>
  <p class="subtitle">SS Rank • Tactical Player</p>
</div>

</body>
</html>
