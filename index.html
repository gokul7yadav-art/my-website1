<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STK×Ghost</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  color: white;
  height: 100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: url('bg.jpg.jpg') center/cover no-repeat;
  animation: fadeIn 0.6s ease;
}

body::before {
  content:"";
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.65);
  z-index:0;
}

/* NAVBAR */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 12px 0;
  text-align: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index: 10;
}

.nav a {
  margin: 0 15px;
  color: #00f5d4;
  text-decoration: none;
  font-weight: bold;
}

.nav a:hover { color:white; }

/* CONTENT */
.container {
  position: relative;
  text-align: center;
  z-index:1;
}

.title {
  font-size: 40px;
  color: #00f5d4;
  text-shadow: 0 0 20px #00f5d4;
}

.subtitle {
  margin-top:10px;
  color: gold;
}

.buttons {
  margin-top:30px;
  display:flex;
  gap:15px;
  justify-content:center;
}

.btn {
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#00f5d4;
  color:black;
  font-weight:bold;
}

.btn.secondary {
  background: transparent;
  border:2px solid #00f5d4;
  color:#00f5d4;
}

/* ANIMATION */
@keyframes fadeIn {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}
</style>
</head>

<body>

<nav class="nav">
  <a href="index.html">Home</a>
  <a href="stats.html">Stats</a>
  <a href="loadout.html">Loadout</a>
</nav>

<div class="container">
  <h1 class="title">STK×Ghost 🔥</h1>
  <p class="subtitle">SS Rank • Tactical Player</p>

  <div class="buttons">
    <a href="stats.html"><button class="btn">View Stats</button></a>
    <a href="loadout.html"><button class="btn secondary">Loadout</button></a>
  </div>
</div>

</body>
</html>
