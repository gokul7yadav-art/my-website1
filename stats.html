<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
  font-family:Arial;
  color:white;
  padding:20px;
  background:url('bg.jpg.jpg') center/cover no-repeat;
  animation:fadeIn 0.6s ease;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

.nav {
  position:fixed;
  top:0;
  width:100%;
  padding:12px 0;
  text-align:center;
  background:rgba(0,0,0,0.6);
}

.nav a {
  position:relative;
  margin:0 15px;
  color:#00f5d4;
  text-decoration:none;
}

.nav a.active { color:white; }

.nav a::after {
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  left:0;
  bottom:-4px;
  background:#00f5d4;
  transition:0.3s;
}

.nav a:hover::after { width:100%; }

.title {
  text-align:center;
  margin-top:60px;
  font-size:32px;
  color:#00f5d4;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  max-width:400px;
  margin:30px auto;
}

.card {
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  text-align:center;
  transition:0.3s;
  opacity:0;
  transform:translateY(30px);
}

.card:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #00f5d4;
}

.value {
  font-size:24px;
  color:#00f5d4;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<nav class="nav">
  <a href="index.html">Home</a>
  <a href="stats.html" class="active">Stats</a>
  <a href="loadout.html">Loadout</a>
</nav>

<h1 class="title">Stats</h1>

<div class="grid">
  <div class="card"><div class="value">6.06</div>F/D Ratio</div>
  <div class="card"><div class="value">146</div>Matches</div>
  <div class="card"><div class="value">25</div>Wins</div>
  <div class="card"><div class="value">885</div>Eliminations</div>
  <div class="card"><div class="value">65.1%</div>Top 10</div>
  <div class="card"><div class="value">17.1%</div>Win Rate</div>
</div>

<script>
const cards = document.querySelectorAll('.card');
const obs = new IntersectionObserver(entries=>{
 entries.forEach(e=>{
  if(e.isIntersecting){
   e.target.style.opacity=1;
   e.target.style.transform="translateY(0)";
  }
 });
});
cards.forEach(c=>obs.observe(c));
</script>

</body>
</html>
